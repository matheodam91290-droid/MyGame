<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyGame — Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#07070a; --dark:#0d0d12; --surface:#13131a; --surface2:#1a1a24;
      --border:#ffffff0f; --border2:#ffffff18;
      --red:#e03030; --bordeaux:#7a0f1e;
      --white:#f2f2f5; --muted:#6e6e80; --muted2:#9898a8;
    }
    body { background:var(--black); color:var(--white); font-family:'Inter',sans-serif; font-size:15px; line-height:1.6; min-height:100vh; overflow-x:hidden; display:flex; flex-direction:column; }

    .neon-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .orb { position:absolute; border-radius:50%; filter:blur(90px); }
    .orb1 { width:600px; height:380px; top:-100px; left:-80px; background:radial-gradient(ellipse,rgba(180,15,30,.18) 0%,transparent 70%); animation:d1 14s ease-in-out infinite alternate; }
    .orb2 { width:450px; height:300px; bottom:10%; right:-80px; background:radial-gradient(ellipse,rgba(122,15,30,.13) 0%,transparent 70%); animation:d2 17s ease-in-out infinite alternate; }
    @keyframes d1 { to { transform:translate(40px,30px) scale(1.07); } }
    @keyframes d2 { to { transform:translate(-30px,50px) scale(1.04); } }
    .grid-overlay { position:fixed; inset:0; pointer-events:none; z-index:0; background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px); background-size:50px 50px; }

    /* NAV */
    nav { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:0 5%; height:60px; background:rgba(7,7,10,.75); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:1.45rem; letter-spacing:.1em; text-transform:uppercase; text-decoration:none; color:var(--white); }
    .logo em { font-style:normal; color:var(--red); }
    .nav-link { color:var(--muted); text-decoration:none; font-size:.78rem; font-weight:500; letter-spacing:.07em; text-transform:uppercase; transition:color .2s; }
    .nav-link:hover { color:var(--white); }

    /* MAIN */
    .main { flex:1; display:flex; align-items:center; justify-content:center; padding:90px 2rem 4rem; position:relative; z-index:1; }

    .auth-box {
      width:100%; max-width:420px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; padding:2.2rem;
      box-shadow:0 0 60px rgba(122,15,30,.12);
    }

    .auth-logo { text-align:center; margin-bottom:1.8rem; }
    .auth-logo .logo { font-size:1.8rem; }
    .auth-logo p { font-size:.78rem; color:var(--muted2); margin-top:.3rem; letter-spacing:.04em; }

    /* TABS */
    .auth-tabs { display:flex; border:1px solid var(--border2); border-radius:4px; overflow:hidden; margin-bottom:1.8rem; }
    .auth-tab { flex:1; background:none; border:none; color:var(--muted); font-family:'Inter',sans-serif; font-size:.8rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:.55rem; cursor:pointer; transition:background .2s,color .2s; }
    .auth-tab.active { background:var(--red); color:#fff; }

    /* FORM */
    .form-group { display:flex; flex-direction:column; gap:.35rem; margin-bottom:1rem; }
    .form-group label { font-size:.68rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); }
    .form-group input, .form-group select {
      background:var(--dark); color:var(--white);
      border:1px solid var(--border2); border-radius:3px;
      padding:.6rem .85rem; font-size:.88rem; font-family:'Inter',sans-serif;
      outline:none; transition:border-color .2s;
      appearance:none;
    }
    .form-group input:focus, .form-group select:focus { border-color:var(--red); }
    .form-group input::placeholder { color:var(--muted); }

    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; }

    .btn-submit {
      width:100%; background:var(--red); color:#fff; border:none; border-radius:3px;
      padding:.72rem; font-size:.88rem; font-weight:600; letter-spacing:.07em; text-transform:uppercase;
      cursor:pointer; margin-top:.5rem;
      box-shadow:0 0 24px rgba(224,48,48,.28);
      transition:box-shadow .2s, transform .15s;
    }
    .btn-submit:hover { box-shadow:0 0 40px rgba(224,48,48,.45); transform:translateY(-1px); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    .form-footer { text-align:center; margin-top:1.2rem; font-size:.75rem; color:var(--muted); }
    .form-footer a { color:var(--muted2); text-decoration:none; transition:color .2s; }
    .form-footer a:hover { color:var(--white); }

    /* MESSAGES */
    .msg { border-radius:3px; padding:.65rem .9rem; font-size:.8rem; margin-bottom:1rem; display:none; }
    .msg.error { background:rgba(224,48,48,.12); border:1px solid rgba(224,48,48,.3); color:#f87171; display:block; }
    .msg.success { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); color:#4ade80; display:block; }

    /* DIVIDER */
    .divider { display:flex; align-items:center; gap:.8rem; margin:.8rem 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border2); }
    .divider span { font-size:.68rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }

    /* SUCCESS STATE */
    .success-state { text-align:center; display:none; }
    .success-state .check {
      width:56px; height:56px; border-radius:50%;
      border:2px solid var(--red); background:rgba(224,48,48,.1);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 1.2rem;
      box-shadow:0 0 20px rgba(224,48,48,.3);
    }
    .success-state .check svg { width:24px; height:24px; stroke:var(--red); fill:none; stroke-width:2; stroke-linecap:round; }
    .success-state h3 { font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; font-weight:700; text-transform:uppercase; margin-bottom:.5rem; }
    .success-state p { font-size:.85rem; color:var(--muted2); font-weight:300; line-height:1.7; }
    .btn-go { display:inline-block; margin-top:1.5rem; background:var(--red); color:#fff; border:none; border-radius:3px; padding:.65rem 2rem; font-size:.82rem; font-weight:600; letter-spacing:.07em; text-transform:uppercase; cursor:pointer; text-decoration:none; box-shadow:0 0 20px rgba(224,48,48,.28); transition:box-shadow .2s; }
    .btn-go:hover { box-shadow:0 0 35px rgba(224,48,48,.45); }
  </style>
</head>
<body>

<div class="neon-bg"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="grid-overlay"></div>

<nav>
  <a href="index.html" class="logo">MY<em>GAME</em></a>
  <a href="index.html" class="nav-link">Retour à l'accueil</a>
</nav>

<div class="main">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="logo">MY<em>GAME</em></div>
      <p>La plateforme gaming ultime</p>
    </div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('signup')">S'inscrire</button>
      <button class="auth-tab" onclick="switchTab('login')">Se connecter</button>
    </div>

    <!-- MESSAGE -->
    <div class="msg" id="msg"></div>

    <!-- SIGNUP FORM -->
    <div id="signup-form">
      <div class="form-row">
        <div class="form-group">
          <label>Pseudo</label>
          <input type="text" id="pseudo" placeholder="ShadowX" maxlength="20" />
        </div>
        <div class="form-group">
          <label>Jeu principal</label>
          <select id="game">
            <option value="">Choisir</option>
            <option>Valorant</option>
            <option>CS2</option>
            <option>League of Legends</option>
            <option>Fortnite</option>
            <option>Apex Legends</option>
            <option>Rocket League</option>
            <option>Call of Duty</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email-signup" placeholder="ton@email.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password-signup" placeholder="8 caractères minimum" />
      </div>
      <button class="btn-submit" onclick="signUp()">Créer mon compte &rarr;</button>
      <div class="form-footer">En t'inscrivant tu acceptes les <a href="#">conditions d'utilisation</a></div>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email-login" placeholder="ton@email.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password-login" placeholder="Ton mot de passe" />
      </div>
      <button class="btn-submit" onclick="logIn()">Se connecter &rarr;</button>
      <div class="form-footer"><a href="#">Mot de passe oublié ?</a></div>
    </div>

    <!-- SUCCESS -->
    <div class="success-state" id="success-state">
      <div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <h3>Bienvenue sur MyGame</h3>
      <p>Ton compte a été créé. Vérifie ton email pour confirmer ton inscription, puis trouve ton premier mate.</p>
      <a href="recherche.html" class="btn-go">Trouver mon mate &rarr;</a>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://njbtmrqgefaiudxeflue.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ZKINhgHtYN9AG5WGbU2mNQ_DpM1BXQP';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => {
      t.classList.toggle('active', (tab==='signup' && i===0)||(tab==='login' && i===1));
    });
    document.getElementById('signup-form').style.display = tab==='signup' ? 'block' : 'none';
    document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
    hideMsg();
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function hideMsg() {
    const el = document.getElementById('msg');
    el.className = 'msg';
  }

  async function signUp() {
    const pseudo = document.getElementById('pseudo').value.trim();
    const game = document.getElementById('game').value;
    const email = document.getElementById('email-signup').value.trim();
    const password = document.getElementById('password-signup').value;

    if (!pseudo || !email || !password || !game) {
      showMsg('Remplis tous les champs pour continuer.', 'error'); return;
    }
    if (password.length < 8) {
      showMsg('Le mot de passe doit faire au moins 8 caractères.', 'error'); return;
    }

    const btn = document.querySelector('#signup-form .btn-submit');
    btn.disabled = true; btn.textContent = 'Création en cours...';

    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { pseudo, game } }
    });

    if (error) {
      showMsg(error.message === 'User already registered' ? 'Cet email est déjà utilisé.' : error.message, 'error');
      btn.disabled = false; btn.textContent = 'Créer mon compte →';
    } else {
      document.getElementById('signup-form').style.display = 'none';
      document.querySelector('.auth-tabs').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
      hideMsg();
    }
  }

  async function logIn() {
    const email = document.getElementById('email-login').value.trim();
    const password = document.getElementById('password-login').value;

    if (!email || !password) {
      showMsg('Remplis tous les champs.', 'error'); return;
    }

    const btn = document.querySelector('#login-form .btn-submit');
    btn.disabled = true; btn.textContent = 'Connexion...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      showMsg('Email ou mot de passe incorrect.', 'error');
      btn.disabled = false; btn.textContent = 'Se connecter →';
    } else {
      window.location.href = 'recherche.html';
    }
  }
</script>

</body>
</html>
